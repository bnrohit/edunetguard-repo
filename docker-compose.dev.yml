version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: edunetguard-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - REACT_APP_API_URL=http://localhost:4000/api
      - CHOKIDAR_USEPOLLING=true
    command: npm start

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: edunetguard-backend-dev
    ports:
      - "4000:4000"
    volumes:
      - ./backend/src:/app/src
      - ./config:/app/config
    environment:
      - NODE_ENV=development
      - PORT=4000
      - UPTIME_KUMA_URL=http://uptime-kuma:3001
      - CACHE_TTL=10
    command: npm run dev

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: edunetguard-kuma-dev
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-dev-data:/app/data

volumes:
  uptime-kuma-dev-data:
