services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edunetguard-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=/api
      - REACT_APP_REFRESH_INTERVAL=30000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - edunetguard

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edunetguard-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - UPTIME_KUMA_URL=http://uptime-kuma:3001
      - CACHE_TTL=30
      - ALLOW_DEMO_FALLBACK=true
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data:ro
    depends_on:
      uptime-kuma:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - edunetguard

  uptime-kuma:
    image: louislam/uptime-kuma:2-slim
    container_name: edunetguard-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    environment:
      - TZ=${TZ:-America/Denver}
    networks:
      - edunetguard

volumes:
  uptime-kuma-data:
    driver: local

networks:
  edunetguard:
    driver: bridge
